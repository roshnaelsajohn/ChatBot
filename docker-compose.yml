version: "3.8"

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: chatbot-backend
    ports:
      - "5001:5000"
    volumes:
      - ./backend/chroma_db:/app/chroma_db
    environment:
      - PYTHONUNBUFFERED=1
      - HF_HUB_DISABLE_SSL_VERIFY=1
      - GOOGLE_API_KEY=${GOOGLE_API_KEY}
    networks:
      - chatbot-network

  frontend:
    build:
      context: ./frontend-react
      dockerfile: Dockerfile
    container_name: chatbot-frontend
    ports:
      - "8501:80"
    depends_on:
      - backend
    networks:
      - chatbot-network

networks:
  chatbot-network:
    driver: bridge
